<header class="flex justify-between items-center w-full px-8 sticky top-0 z-40 ml-64 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md h-16 border-b border-slate-100 dark:border-slate-800" style="width: calc(100% - 16rem);">
  <div class="flex items-center gap-4">
    <div class="relative">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-sm">search</span>
      <input class="bg-surface-container-low border-none rounded-full py-2 pl-10 pr-4 text-[10px] tracking-wider font-semibold focus:ring-2 focus:ring-primary-fixed w-64 uppercase text-on-surface" placeholder="SEARCH TRANSACTIONS..." type="text"/>
    </div>
    <nav class="flex items-center gap-2 text-xs uppercase tracking-wider font-semibold text-slate-500">
      <span>Dashboard</span>
      <span class="material-symbols-outlined text-[10px]">chevron_right</span>
      <span class="text-indigo-600 dark:text-indigo-400 font-bold">Overview</span>
    </nav>
  </div>
  
  <div class="flex items-center gap-6">
    <button class="relative text-slate-500 hover:text-indigo-500 transition-opacity duration-300">
      <span class="material-symbols-outlined">notifications</span>
      <span class="absolute top-0 right-0 w-2 h-2 bg-error rounded-full border-2 border-white"></span>
    </button>
    <div class="flex items-center gap-3">
      <div class="text-right">
        <p class="text-[10px] font-bold text-on-surface uppercase border-neutral-100">User Setup</p>
        <p class="text-[8px] text-on-surface-variant font-semibold">ADMINISTRATOR</p>
      </div>
      <div class="w-10 h-10 rounded-full bg-slate-200 border-2 border-primary overflow-hidden flex items-center justify-center">
         <span class="material-symbols-outlined text-slate-400">person</span>
      </div>
    </div>
  </div>
</header>
