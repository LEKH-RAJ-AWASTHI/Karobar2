<aside class="flex flex-col h-full fixed left-0 top-0 bg-slate-50 dark:bg-slate-900 w-64 border-r-0 z-50 overflow-y-auto no-scrollbar shadow-sm shadow-slate-200 dark:shadow-slate-800">
  <div class="px-6 py-8">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance</span>
      </div>
      <div>
        <h1 class="text-xl font-bold text-indigo-700 dark:text-indigo-400 tracking-tight">Karobar</h1>
        <p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-semibold">Finance & Accounting</p>
      </div>
    </div>
  </div>
  
  <nav class="flex-1 px-4 space-y-2">
    <ng-container *ngFor="let item of navItems">
      <a [routerLink]="item.path" 
         routerLinkActive="text-indigo-700 dark:text-indigo-300 font-semibold border-r-4 border-indigo-600 bg-slate-100 dark:bg-slate-800/50" 
         [routerLinkActiveOptions]="{exact: false}"
         [class.text-slate-600]="true"
         [class.dark:text-slate-400]="true"
         class="flex items-center gap-3 px-4 py-3 rounded-lg hover:text-indigo-500 hover:bg-slate-200/50 dark:hover:bg-slate-800 transition-colors duration-200 ease-in-out cursor-pointer">
        <span class="material-symbols-outlined">{{item.icon}}</span>
        <span class="font-sans text-sm font-medium">{{item.label}}</span>
      </a>
    </ng-container>
  </nav>
  
  <div class="p-4 border-t border-slate-200 dark:border-slate-800">
    <a (click)="logout()" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 dark:text-slate-400 hover:text-error hover:bg-error-container/20 transition-colors duration-200 cursor-pointer">
      <span class="material-symbols-outlined">logout</span>
      <span class="font-sans text-sm font-medium">Logout</span>
    </a>
  </div>
</aside>
