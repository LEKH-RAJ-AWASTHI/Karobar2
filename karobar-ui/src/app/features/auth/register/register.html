<div class="min-h-screen flex items-center justify-center bg-background px-4 py-8">
  <div class="max-w-md w-full bg-surface-container-lowest rounded-3xl shadow-xl shadow-primary/5 p-8 border border-outline-variant/10 animate-fade-in-up">
    
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-tertiary-container/10 rounded-2xl flex items-center justify-center text-tertiary mx-auto mb-4">
        <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">person_add</span>
      </div>
      <h2 class="text-2xl font-bold tracking-tight text-on-surface">Create an Account</h2>
      <p class="text-sm text-slate-500 mt-2">Join Karobar and manage your finances</p>
    </div>

    <div *ngIf="errorMessage" class="bg-error-container text-on-error-container text-sm p-4 rounded-xl mb-6 font-medium animate-fade-in">
      {{ errorMessage }}
    </div>
    <div *ngIf="successMessage" class="bg-primary-fixed text-on-primary-fixed-variant text-sm p-4 rounded-xl mb-6 font-medium animate-fade-in flex flex-col gap-2">
      {{ successMessage }}
      <button [routerLink]="['/login']" class="bg-white/50 py-2 rounded-lg font-bold hover:bg-white transition-colors">Go to Login</button>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5" *ngIf="!successMessage">
      <!-- Full Name -->
      <div class="space-y-2">
        <label class="text-[10px] uppercase tracking-widest font-bold text-secondary ml-1">Full Name</label>
        <input 
          formControlName="fullName"
          type="text" 
          class="w-full border-none bg-surface-container-low rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary-fixed transition-all outline-none text-on-surface font-medium" 
          placeholder="John Doe" />
      </div>

      <!-- Email -->
      <div class="space-y-2">
        <label class="text-[10px] uppercase tracking-widest font-bold text-secondary ml-1">Email Address</label>
        <input 
          formControlName="email"
          type="email" 
          class="w-full border-none bg-surface-container-low rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary-fixed transition-all outline-none text-on-surface font-medium" 
          placeholder="admin@karobar.io" />
      </div>

      <!-- Password Layout Grid -->
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-2">
          <label class="text-[10px] uppercase tracking-widest font-bold text-secondary ml-1">Password</label>
          <input 
            formControlName="password"
            type="password" 
            class="w-full border-none bg-surface-container-low rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary-fixed transition-all outline-none text-on-surface font-medium" 
            placeholder="••••••••" />
        </div>
        <div class="space-y-2">
          <label class="text-[10px] uppercase tracking-widest font-bold text-secondary ml-1">Confirm</label>
          <input 
            formControlName="confirmPassword"
            type="password" 
            class="w-full border-none bg-surface-container-low rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-error transition-all outline-none text-on-surface font-medium" 
            [class.focus:ring-error]="registerForm.errors?.['passwordMismatch'] && registerForm.get('confirmPassword')?.touched"
            placeholder="••••••••" />
        </div>
      </div>
      <div *ngIf="registerForm.errors?.['passwordMismatch'] && registerForm.get('confirmPassword')?.touched" class="text-error text-[10px] px-2 font-bold uppercase tracking-wider">
        Passwords do not match
      </div>

      <button 
        type="submit" 
        [disabled]="loading || registerForm.invalid"
        class="w-full py-4 rounded-xl font-bold bg-secondary text-white hover:bg-on-secondary-fixed-variant transition-all shadow-lg shadow-secondary/20 flex justify-center items-center h-14 mt-6 disabled:opacity-50 disabled:cursor-not-allowed">
        <span *ngIf="!loading">Create Account</span>
        <span *ngIf="loading" class="material-symbols-outlined animate-spin">progress_activity</span>
      </button>
    </form>

    <p class="text-center text-sm text-slate-500 mt-8 font-medium">
      Already using Karobar? 
      <a [routerLink]="['/login']" class="text-secondary font-bold hover:underline">Sign In</a>
    </p>
  </div>
</div>
