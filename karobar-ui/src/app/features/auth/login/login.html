<div class="min-h-screen flex items-center justify-center bg-background px-4">
  <div class="max-w-md w-full bg-surface-container-lowest rounded-3xl shadow-xl shadow-primary/5 p-8 border border-outline-variant/10 animate-fade-in-up">
    
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center text-on-primary-container mx-auto mb-4">
        <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
      </div>
      <h2 class="text-2xl font-bold tracking-tight text-on-surface">Welcome back</h2>
      <p class="text-sm text-slate-500 mt-2">Enter your credentials to access Karobar</p>
    </div>

    <div *ngIf="errorMessage" class="bg-error-container text-on-error-container text-sm p-4 rounded-xl mb-6 font-medium animate-fade-in">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="space-y-2">
        <label class="text-[10px] uppercase tracking-widest font-bold text-secondary ml-1">Email Address</label>
        <input 
          formControlName="email"
          type="email" 
          class="w-full border-none bg-surface-container-low rounded-xl px-5 py-4 focus:ring-2 focus:ring-primary-fixed transition-all outline-none text-on-surface font-medium" 
          placeholder="admin@karobar.io" />
        <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-error text-xs px-2 font-medium">
          Please enter a valid email.
        </div>
      </div>

      <div class="space-y-2">
        <div class="flex justify-between items-center ml-1">
          <label class="text-[10px] uppercase tracking-widest font-bold text-secondary">Password</label>
          <a href="#" class="text-xs font-bold text-primary hover:underline">Forgot?</a>
        </div>
        <input 
          formControlName="password"
          type="password" 
          class="w-full border-none bg-surface-container-low rounded-xl px-5 py-4 focus:ring-2 focus:ring-primary-fixed transition-all outline-none text-on-surface font-medium" 
          placeholder="••••••••" />
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-error text-xs px-2 font-medium">
          Password is required.
        </div>
      </div>

      <button 
        type="submit" 
        [disabled]="loading"
        class="w-full py-4 rounded-xl font-bold bg-primary text-white hover:bg-primary-container transition-all shadow-lg shadow-primary/20 flex justify-center items-center h-14 disabled:opacity-70 disabled:cursor-not-allowed">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading" class="material-symbols-outlined animate-spin">progress_activity</span>
      </button>
    </form>

    <p class="text-center text-sm text-slate-500 mt-8 font-medium">
      Don't have an account? 
      <a [routerLink]="['/register']" class="text-primary font-bold hover:underline mix-blend-multiply">Create one</a>
    </p>
  </div>
</div>
