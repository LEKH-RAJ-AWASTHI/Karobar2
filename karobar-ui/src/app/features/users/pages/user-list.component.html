<div class="space-y-8">
  <!-- Header Area -->
  <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
    <div>
      <h2 class="text-3xl font-bold tracking-tight text-on-surface">User Management</h2>
      <p class="text-on-surface-variant mt-1">Govern access levels, invite team members, and manage permissions.</p>
    </div>
    <div class="flex gap-3">
      <button
        routerLink="create"
        class="px-6 py-2.5 bg-gradient-to-r from-primary to-primary-container text-white text-sm font-bold rounded-lg hover:shadow-lg hover:shadow-primary/20 transition-all flex items-center gap-2">
        <span class="material-symbols-outlined text-lg">person_add</span>
        Add New User
      </button>
    </div>
  </div>

  <!-- Filters/Search Area -->
  <div class="bg-surface-container-low/30 px-6 py-4 rounded-2xl flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div class="relative w-full md:w-96">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-sm">search</span>
      <input
        [formControl]="searchControl"
        class="w-full bg-surface-container-low border-none rounded-full py-2.5 pl-10 pr-4 text-xs tracking-wider font-semibold focus:ring-2 focus:ring-primary-fixed uppercase placeholder-secondary"
        placeholder="SEARCH USERS BY NAME OR EMAIL..." type="text" />
    </div>
    
    <div class="flex items-center gap-2">
      <button class="p-2.5 text-on-surface-variant hover:text-primary transition-colors bg-surface-container rounded-xl">
         <span class="material-symbols-outlined">filter_list</span>
      </button>
    </div>
  </div>

  <!-- Users Table -->
  <div class="bg-surface-container-lowest rounded-3xl overflow-hidden shadow-sm border border-outline-variant/10">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-surface-container-low">
            <th class="px-8 py-4 text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Full Name</th>
            <th class="px-8 py-4 text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Email</th>
            <th class="px-8 py-4 text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Role</th>
            <th class="px-8 py-4 text-right text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-outline-variant/5">
          <tr *ngFor="let user of users" class="hover:bg-surface-container-low/50 transition-colors">
            <td class="px-8 py-5">
              <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-primary-fixed flex items-center justify-center font-bold text-xs text-on-primary-fixed">
                  {{ getInitials(user.fullName) }}
                </div>
                <span class="text-sm font-semibold text-on-surface">{{ user.fullName }}</span>
              </div>
            </td>
            <td class="px-8 py-5 text-sm text-on-surface-variant italic">{{ user.email }}</td>
            <td class="px-8 py-5">
              <span 
                [ngClass]="{
                  'bg-primary-fixed text-on-primary-fixed-variant': user.role === 'Admin',
                  'bg-secondary-fixed text-on-secondary-fixed-variant': user.role === 'Manager',
                  'bg-tertiary-fixed text-on-tertiary-fixed-variant': user.role === 'User'
                }"
                class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-tighter">
                {{ user.role }}
              </span>
            </td>
            <td class="px-8 py-5 text-right">
              <div class="flex items-center justify-end gap-2">
                <button 
                  [routerLink]="['edit', user.id]" 
                  class="p-2 text-primary hover:bg-primary-fixed/20 rounded-lg transition-colors">
                  <span class="material-symbols-outlined text-lg">edit</span>
                </button>
                <button 
                  (click)="onDelete(user)" 
                  class="p-2 text-error hover:bg-error-container/20 rounded-lg transition-colors">
                  <span class="material-symbols-outlined text-lg">delete</span>
                </button>
              </div>
            </td>
          </tr>
          
          <!-- Empty State -->
          <tr *ngIf="users.length === 0 && !loading">
            <td colspan="4" class="px-8 py-12 text-center">
              <span class="material-symbols-outlined text-4xl text-outline mb-2">person_off</span>
              <p class="text-on-surface-variant font-medium">No users found.</p>
            </td>
          </tr>
          
          <!-- Loading State -->
          <tr *ngIf="loading">
            <td colspan="4" class="px-8 py-12 text-center text-primary">
              <div class="animate-spin h-6 w-6 border-2 border-primary border-t-transparent rounded-full mx-auto mb-2"></div>
              <p class="text-xs font-bold uppercase tracking-widest mt-2">Fetching Personnel...</p>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
