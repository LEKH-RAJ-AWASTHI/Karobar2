<form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="bg-surface-container-low p-8 rounded-3xl space-y-6">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    
    <!-- Full Name -->
    <div class="space-y-1.5">
      <label class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Full Name</label>
      <div class="relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">person</span>
        <input 
          formControlName="fullName"
          type="text" 
          class="w-full bg-surface-container-lowest border-none rounded-xl py-3 pl-11 pr-4 text-sm font-semibold focus:ring-2 focus:ring-primary-fixed"
          placeholder="e.g. Aman Sharma">
      </div>
      <div *ngIf="userForm.get('fullName')?.touched && userForm.get('fullName')?.invalid" class="text-[10px] font-bold text-error uppercase tracking-wider pl-4 mt-1">
         Full name is required.
      </div>
    </div>

    <!-- Email -->
    <div class="space-y-1.5">
      <label class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Email Address</label>
      <div class="relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">mail</span>
        <input 
          formControlName="email"
          type="email" 
          class="w-full bg-surface-container-lowest border-none rounded-xl py-3 pl-11 pr-4 text-sm font-semibold focus:ring-2 focus:ring-primary-fixed"
          placeholder="e.g. aman@karobar.com">
      </div>
      <div *ngIf="userForm.get('email')?.touched && userForm.get('email')?.invalid" class="text-[10px] font-bold text-error uppercase tracking-wider pl-4 mt-1">
         Please enter a valid email address.
      </div>
    </div>

    <!-- Password (only for create) -->
    <div *ngIf="isCreate" class="space-y-1.5">
      <label class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Temporary Password</label>
      <div class="relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">lock</span>
        <input 
          formControlName="password"
          type="password" 
          class="w-full bg-surface-container-lowest border-none rounded-xl py-3 pl-11 pr-4 text-sm font-semibold focus:ring-2 focus:ring-primary-fixed"
          placeholder="********">
      </div>
       <div *ngIf="userForm.get('password')?.touched && userForm.get('password')?.invalid" class="text-[10px] font-bold text-error uppercase tracking-wider pl-4 mt-1">
         Password must be at least 6 characters long.
      </div>
    </div>

    <!-- Role -->
    <div class="space-y-1.5">
      <label class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">System Role</label>
      <div class="relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">badge</span>
        <select 
          formControlName="role"
          class="w-full bg-surface-container-lowest border-none rounded-xl py-3 pl-11 pr-4 text-sm font-semibold focus:ring-2 focus:ring-primary-fixed appearance-none">
          <option value="Cashier">Cashier</option>
          <option value="Accountant">Accountant</option>
          <option value="Manager">Department Manager</option>
          <option value="Admin">System Administrator</option>
        </select>
      </div>
    </div>

  </div>

  <div class="flex justify-end gap-3 pt-4 border-t border-outline-variant/10">
    <button 
      type="button" 
      (click)="onCancel.emit()"
      class="px-6 py-2.5 bg-surface-container-high text-on-surface text-sm font-bold rounded-xl hover:bg-surface-container-highest transition-colors">
      Cancel Operation
    </button>
    <button 
      type="submit" 
      [disabled]="userForm.invalid"
      class="px-8 py-2.5 bg-gradient-to-r from-primary to-primary-container text-white text-sm font-bold rounded-xl hover:shadow-lg hover:shadow-primary/20 transition-all flex items-center gap-2 disabled:opacity-50">
      <span class="material-symbols-outlined text-lg">{{ isCreate ? 'save' : 'edit' }}</span>
      {{ isCreate ? 'Confirm Personnel Invite' : 'Update User Protocol' }}
    </button>
  </div>
</form>
