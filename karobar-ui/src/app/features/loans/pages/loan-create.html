<div class="max-w-2xl mx-auto py-8 animate-fade-in-up">
  <div class="mb-6">
    <a [routerLink]="['/loans']" class="text-sm font-semibold text-slate-500 hover:text-primary flex items-center gap-1 w-max transition-colors">
      <span class="material-symbols-outlined text-sm">arrow_back</span>
      Back to Loans
    </a>
  </div>

  <div class="bg-surface-container-lowest rounded-3xl shadow-sm border border-outline-variant/10 overflow-hidden">
    <div class="p-8 border-b border-slate-100 bg-slate-50">
      <h2 class="text-2xl font-bold text-on-surface">Issue New Loan</h2>
      <p class="text-slate-500 text-sm mt-1">Provide loan details for the farmer ledger.</p>
    </div>
    
    <form [formGroup]="loanForm" (ngSubmit)="onSubmit()" class="p-8 space-y-6">
      <div class="space-y-2">
        <label class="text-[10px] uppercase tracking-widest font-bold text-secondary">Farmer (Ledger Selection)</label>
        <select formControlName="farmerId" class="w-full border-none bg-surface-container-low rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-fixed transition-all outline-none text-on-surface cursor-pointer font-medium">
          <option value="" disabled>Select Farmer Ledger</option>
          <option value="1">John Doe - Farmer</option>
          <option value="2">Jane Smith - Trader</option>
        </select>
        <div *ngIf="loanForm.get('farmerId')?.touched && loanForm.get('farmerId')?.errors" class="text-xs text-error font-bold ml-1">
          Please select a farmer ledger.
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-6 border-b border-dashed border-slate-200">
        <div class="space-y-2">
          <label class="text-[10px] uppercase tracking-widest font-bold text-secondary">Principal Amount</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">₹</span>
            <input formControlName="principalAmount" type="number" class="w-full border-none bg-surface-container-low rounded-xl pl-8 pr-4 py-3 focus:ring-2 focus:ring-primary-fixed transition-all outline-none text-on-surface placeholder:text-slate-400 font-bold" placeholder="0.00" />
          </div>
          <div *ngIf="loanForm.get('principalAmount')?.touched && loanForm.get('principalAmount')?.errors" class="text-xs text-error font-bold ml-1">
            Valid principal amount required.
          </div>
        </div>
        <div class="space-y-2">
          <label class="text-[10px] uppercase tracking-widest font-bold text-secondary">Interest Rate (%)</label>
          <div class="relative">
            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">%</span>
            <input formControlName="interestRate" type="number" class="w-full border-none bg-surface-container-low rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-fixed transition-all outline-none text-on-surface placeholder:text-slate-400 font-bold " placeholder="12.0" />
          </div>
          <div *ngIf="loanForm.get('interestRate')?.touched && loanForm.get('interestRate')?.errors" class="text-xs text-error font-bold ml-1">
            Interest rate required.
          </div>
        </div>
      </div>

      <div class="space-y-2">
        <label class="text-[10px] uppercase tracking-widest font-bold text-secondary">Start Date</label>
        <input formControlName="startDate" type="date" class="w-full border-none bg-surface-container-low rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-fixed transition-all outline-none text-on-surface cursor-pointer font-medium" />
        <div *ngIf="loanForm.get('startDate')?.touched && loanForm.get('startDate')?.errors" class="text-xs text-error font-bold ml-1">
          Valid start date required.
        </div>
      </div>

      <div class="p-8 bg-surface-container/30 -mx-8 -mb-8 flex gap-4 justify-end border-t border-slate-100 dark:border-slate-800">
        <button type="button" [routerLink]="['/loans']" class="py-3 px-6 rounded-xl font-bold bg-white text-on-surface hover:bg-slate-50 transition-colors border border-slate-200">Cancel</button>
        <button 
          type="submit"
          [disabled]="loanForm.invalid || loading"
          class="py-3 px-8 rounded-xl font-bold bg-primary text-white hover:bg-primary-container transition-colors shadow-lg shadow-primary/20 flex items-center gap-2 disabled:opacity-50"
        >
          <span *ngIf="loading" class="animate-spin h-4 w-4 border-2 border-white/20 border-t-white rounded-full"></span>
          <span class="material-symbols-outlined text-sm" *ngIf="!loading">save</span>
          Issue Loan
        </button>
      </div>
    </form>
  </div>
</div>
